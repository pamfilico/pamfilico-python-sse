services:
  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "5098:5000"
    environment:
      - NEXTAUTH_URL=http://localhost:5000
    depends_on:
      redis:
        condition: service_healthy
